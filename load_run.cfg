source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

set VEC_ADDR  0x20000000
set CODE_ADDR 0x20000400
set BUF_ADDR  0x20001000

init
halt

echo "=== Load binary ==="
load_image /home/marek/tmp/kosiarka/eeprom_read.bin $CODE_ADDR

echo "=== Zero buffer ==="
for {set i 0} {$i < 256} {incr i 4} {
    mww [expr {$BUF_ADDR + $i}] 0
}

echo "=== Set up full vector table (exceptions 0-15) ==="
mww [expr {$VEC_ADDR + 0x00}] 0x20000300
for {set i 1} {$i < 16} {incr i} {
    mww [expr {$VEC_ADDR + $i*4}] [expr {$CODE_ADDR | 1}]
}

echo "=== VTOR to SRAM, disable FPU + exceptions ==="
mww 0xE000ED08 $VEC_ADDR
mww 0xE000E010 0x00000000
mww 0xE000ED04 0x0A000000
# Disable system exceptions (MemManage, BusFault, UsageFault)
mww 0xE000ED24 0x00000000
# Disable FPU lazy stacking to avoid MPU fault
mww 0xE000ED88 0x00000000
mww 0xE000EDF0 0x00000000
# Clear all NVIC pending and mask all
mww 0xE000E280 0xFFFFFFFF
mww 0xE000E284 0xFFFFFFFF
mww 0xE000E288 0xFFFFFFFF
mww 0xE000E28C 0xFFFFFFFF
mww 0xE000E180 0xFFFFFFFF
mww 0xE000E184 0xFFFFFFFF
mww 0xE000E188 0xFFFFFFFF
mww 0xE000E18C 0xFFFFFFFF

echo "=== Pend PendSV ==="
mww 0xE000ED04 0x10000000

echo "=== Resume (200ms) ==="
reg sp 0x20000300
reg msp 0x20000300
resume
sleep 200
halt

echo "=== Fault Debug ==="
set cfsr [capture { mdw 0xE000ED28 1 }]
echo "CFSR: $cfsr"
set hfsr [capture { mdw 0xE000ED2C 1 }]
echo "HFSR: $hfsr"
set bfar [capture { mdw 0xE000ED38 1 }]
echo "BFAR: $bfar"
set mmfar [capture { mdw 0xE000ED34 1 }]
echo "MMFAR: $mmfar"
set afsr [capture { mdw 0xE000ED3C 1 }]
echo "AFSR: $afsr"
set i2c1 [capture { mdw 0x40005400 1 }]
echo "0x40005400: $i2c1"
set i2c2 [capture { mdw 0x40005800 1 }]
echo "0x40005800: $i2c2"
set sr1 [capture { mdw 0x40005814 1 }]
echo "SR1: $sr1"
set sr2 [capture { mdw 0x40005818 1 }]
echo "SR2: $sr2"
set buf [capture { mdw $BUF_ADDR 4 }]
echo "BUF: $buf"

echo "=== Restore VTOR ==="
mww 0xE000ED08 0x08000000

echo "=== Read buffer ==="
set fd [open /home/marek/tmp/kosiarka/eeprom_dump.txt w]
for {set i 0} {$i < 256} {incr i 4} {
    set cap [capture { mdw [expr {$BUF_ADDR + $i}] 1 }]
    set idx [string last ": 0x" $cap]
    if {$idx >= 0} {
        set hstr [string range $cap [expr {$idx + 4}] end]
        set hstr [string trim $hstr]
        set hv [expr "0x$hstr"]
        puts $fd [format "%02x %02x %02x %02x" \
            [expr {$hv & 0xFF}] [expr {($hv >> 8) & 0xFF}] \
            [expr {($hv >> 16) & 0xFF}] [expr {($hv >> 24) & 0xFF}]]
    }
}
close $fd
echo "Saved to eeprom_dump.txt"

echo "=== Done ==="
resume
shutdown
