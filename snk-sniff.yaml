substitutions:
  name: snk-sniff
  friendly_name: SNK Sniff

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

logger:
  baud_rate: 0
  level: DEBUG
  logs:
    uart: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

web_server:
  port: 80

api:

# UART1: nasłuch MB→ESP (J2 pin 3 →)
# rx_pin podłączony do linii TX mainboarda
uart:
  - id: uart_mb
    baud_rate: 230400
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_pin: GPIO16
    debug:
      direction: RX
      dummy_receiver: true
      after:
        timeout: 30ms
      sequence:
        - lambda: |-
            std::string ascii;
            for (uint8_t b : x) {
              if (b >= 32 && b < 127) ascii += (char)b;
              else if (b == '\n') ascii += "\\n";
              else if (b == '\r') ascii += "\\r";
              else ascii += '.';
            }
            ESP_LOGD("mb_tx", "%s", ascii.c_str());

  # UART2: nasłuch ESP→MB (J2 pin 4 ←)
  - id: uart_esp
    baud_rate: 230400
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_pin: GPIO17
    debug:
      direction: RX
      dummy_receiver: true
      after:
        timeout: 30ms
      sequence:
        - lambda: |-
            std::string ascii;
            for (uint8_t b : x) {
              if (b >= 32 && b < 127) ascii += (char)b;
              else if (b == '\n') ascii += "\\n";
              else if (b == '\r') ascii += "\\r";
              else ascii += '.';
            }
            ESP_LOGD("esp_tx", "%s", ascii.c_str());

binary_sensor:
  - platform: gpio
    name: "Button START"
    pin:
      number: GPIO18
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on_off: 50ms
    internal: true
    on_press:
      - logger.log: "START pressed"
    on_release:
      - logger.log: "START released"

  - platform: gpio
    name: "Button OK"
    pin:
      number: GPIO19
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on_off: 50ms
    internal: true
    on_press:
      - logger.log: "OK pressed"
    on_release:
      - logger.log: "OK released"

  - platform: gpio
    name: "Button ON"
    pin:
      number: GPIO21
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on_off: 50ms
    internal: true
    on_press:
      - logger.log: "ON pressed"
    on_release:
      - logger.log: "ON released"
