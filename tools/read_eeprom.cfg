source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

set B 0x40005800
proc R {o} { return [read_memory [expr {$::B + $o}] 32 1] }
proc W {o v} { mww [expr {$::B + $o}] $v }
proc WAIT {o mask maxtry} {
    set n 0
    while {$n < $maxtry} {
        set v [R $o]
        if {$v & $mask} { return 1 }
        incr n
    }
    return 0
}

proc rd_byte {} {
    WAIT 0x14 0x20 200000
    set v [R 0x10]
    return [expr {$v & 0xFF}]
}

init
halt

echo "=== I2C1 Regs ==="
set cr1 [R 0x00]; set cr2 [R 0x04]
set sr1 [R 0x14]; set sr2 [R 0x18]
set ccr [R 0x1C]
echo [format "CR1=0x%04x CR2=0x%04x SR1=0x%04x SR2=0x%04x CCR=0x%04x" $cr1 $cr2 $sr1 $sr2 $ccr]

# Write EEPROM addr 0x00
# CR1: START=1 (bit12), ACK=1 (bit10), PE=1 (bit0)
W 0x00 0x1501
WAIT 0x14 0x01 200000
W 0x10 0xA0  ;# dev addr + write
WAIT 0x14 0x02 200000
set sr1 [R 0x14]
if {$sr1 & 0x100} { echo "NACK dev addr!"; resume; shutdown }
set _ [R 0x18]  ;# clear ADDR
WAIT 0x14 0x40 200000
W 0x10 0x00  ;# mem addr = 0
WAIT 0x14 0x44 200000
set sr1 [R 0x14]
if {$sr1 & 0x100} { echo "NACK mem addr!"; resume; shutdown }

# Repeated start + read 256 bytes
W 0x00 0x1501  ;# START again
WAIT 0x14 0x01 200000
W 0x10 0xA1  ;# dev addr + read
WAIT 0x14 0x02 200000
set sr1 [R 0x14]
if {$sr1 & 0x100} { echo "NACK rd addr!"; resume; shutdown }
set _ [R 0x18]  ;# clear ADDR

# Read first 255 bytes with ACK
set fd [open /tmp/eeprom_dump.bin wb]
fconfigure $fd -translation binary
for {set i 0} {$i < 255} {incr i} {
    set b [rd_byte]
    puts -nonewline $fd [format %c $b]
}
# Last byte - NAK + STOP
W 0x00 0x0901  ;# ACK=0, STOP=1, PE=1
set b [rd_byte]
puts -nonewline $fd [format %c $b]
close $fd

echo "=== READ 256 BYTES DONE ==="
# Display as hex
set fd [open /tmp/eeprom_dump.bin r]
fconfigure $fd -translation binary
set data [read $fd 256]
close $fd
binary scan $data H* hex
echo "HEX: $hex"
# First 16 bytes as ASCII
set ascii ""
for {set i 0} {$i < 16} {incr i} {
    set c [string index $data $i]
    if {$c >= 0x20 && $c < 0x7F} {
        append ascii $c
    } else {
        append ascii "."
    }
}
echo "ASCII(16): $ascii"

resume
shutdown
