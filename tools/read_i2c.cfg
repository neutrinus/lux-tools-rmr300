source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

init
reset init
echo "=== I2C1 @ 0x40005800 ==="
mdw 0x40005800 9
echo "=== RCC ==="
mdw 0x4002101C 1
mdw 0x40021018 1
mdw 0x40021014 1
echo "=== GPIOB CTL ==="
mdw 0x40010C00 2
resume
shutdown
