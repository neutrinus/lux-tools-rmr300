source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

proc rd32 {a} {
    set r [capture { mdw $a 1 }]
    # mdw output: "0xXXXX: 0xYYYY"
    set idx [string last ": 0x" $r]
    if {$idx >= 0} {
        set h [string range $r [expr {$idx + 4}] end]
        # Trim whitespace/newline
        set h [string trim $h]
        return [expr "0x$h"]
    }
    return -1
}

proc p s { puts $s; flush stdout }

init
halt

p "=== I2C INIT ==="
p "CR1=[format 0x%04x [rd32 0x40005800]]"
p "SR1=[format 0x%04x [rd32 0x40005814]]"
p "SR2=[format 0x%04x [rd32 0x40005818]]"

# Reset I2C
mww 0x40005800 0
mww 0x40005800 0x401

# START
mww 0x40005800 0x1401
p "=== START issued, polling SB ==="
for {set i 0} {$i < 200} {incr i} {
    set sr1 [rd32 0x40005814]
    if {$sr1 & 1} { p "SB=1 at i=$i"; break }
}
p "SR1=[format 0x%04x [rd32 0x40005814]]"

# Write 0xA0
mww 0x40005810 0xA0
p "=== After dev addr, polling ADDR ==="
for {set i 0} {$i < 200} {incr i} {
    set sr1 [rd32 0x40005814]
    if {$sr1 & 2} { p "ADDR=1 at i=$i"; break }
    if {$sr1 & 0x100} { p "AF=1(NACK) at i=$i"; break }
}
p "FINAL SR1=[format 0x%04x [rd32 0x40005814]]"
p "FINAL SR2=[format 0x%04x [rd32 0x40005818]]"

mww 0x40005800 0x401
resume
shutdown
