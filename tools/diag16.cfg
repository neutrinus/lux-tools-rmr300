source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]
set CODE 0x20000400
init
halt
load_image /home/marek/tmp/kosiarka/tools/eeprom_diag.bin $CODE
mww 0xE000ED88 0
mww 0xE000EDF0 0
mww 0xE000ED94 0
mww 0xE000E180 0xFFFFFFFF
mww 0xE000E184 0xFFFFFFFF
mww 0xE000E188 0xFFFFFFFF
mww 0xE000E18C 0xFFFFFFFF
mww 0xE000E010 0
reg control 0
reg primask 1
reg faultmask 1
reg msp 0x20000380
reg sp 0x20000380
reg xPSR 0x01000000
reg pc [expr {$CODE | 1}]
resume
sleep 300
halt
echo "MODE: [capture { reg pc }]"
echo "STATUS: [capture { mdw 0x2000FFF0 1 }]"
echo "PROG:   [capture { mdw 0x2000FFF4 1 }]"
echo "DATA:   [capture { mdw 0x2000FF00 4 }]"
resume
shutdown
