source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

set CODE 0x20000400
set BUF  0x2000FF00

proc setup_run {start count ms} {
    global CODE
    halt
    load_image /home/marek/tmp/kosiarka/tools/eeprom_diag.bin $CODE
    mww 0x2000FFF0 0
    mww 0x2000FFF4 0
    mww 0x2000FFF8 $start
    mww 0x2000FFFC $count
    mww 0xE000ED88 0
    mww 0xE000EDF0 0
    mww 0xE000ED94 0
    mww 0xE000E180 0xFFFFFFFF
    mww 0xE000E184 0xFFFFFFFF
    mww 0xE000E188 0xFFFFFFFF
    mww 0xE000E18C 0xFFFFFFFF
    mww 0xE000E010 0
    reg control 0
    reg primask 1
    reg faultmask 1
    reg msp 0x20000380
    reg sp 0x20000380
    reg xPSR 0x01000000
    reg pc [expr {$CODE | 1}]
    resume
    sleep $ms
    halt
}

proc statusword {} {
    set cap [capture { mdw 0x2000FFF0 1 }]
    set idx [string last ": " $cap]
    return [string trim [string range $cap [expr {$idx + 2}] end]]
}

init

# Read a contiguous range [START_BASE, START_BASE+RANGE) in CHUNK-sized pieces.
# Designed to be run after a fresh power-cycle for a wedge-free bus.
if {![info exists START_BASE]} { set START_BASE 0 }
if {![info exists RANGE]}      { set RANGE 256 }

set CHUNK 16
for {set base $START_BASE} {$base < [expr {$START_BASE + $RANGE}]} {incr base $CHUNK} {
    set ok 0
    for {set try 0} {$try < 4 && !$ok} {incr try} {
        setup_run $base $CHUNK 200
        set st [statusword]
        if {$st eq "600dda7a"} {
            set ok 1
            dump_image /home/marek/tmp/kosiarka/chunk_$base.bin $BUF $CHUNK
            echo "chunk $base: OK (try $try)"
        } else {
            echo "chunk $base: retry $try status=$st"
        }
    }
    if {!$ok} { echo "chunk $base: FAILED after retries"; break }
}
echo "=== done ==="
resume
shutdown
