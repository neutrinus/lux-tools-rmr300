source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

set CODE_ADDR 0x20000400
set BUF_ADDR  0x20001000

init
halt

echo "=== Load binary ==="
load_image /home/marek/tmp/kosiarka/tools/eeprom_read.bin $CODE_ADDR

echo "=== Zero buffer + status ==="
for {set i 0} {$i < 256} {incr i 4} {
    mww [expr {$BUF_ADDR + $i}] 0
}
mww 0x20001F00 0
# EEPROM word address to start read from (override with -c "set WORDADDR 0x10")
if {![info exists WORDADDR]} { set WORDADDR 0x00 }
mww 0x20001F04 $WORDADDR

echo "=== Disable FPU / MPU / exceptions (thread-mode run, no PendSV) ==="
# CPACR: deny FPU
mww 0xE000ED88 0x00000000
# FPCCR: no lazy/auto FP stacking
mww 0xE000EDF0 0x00000000
# MPU_CTRL off
mww 0xE000ED94 0x00000000
# SHCSR: disable cfg fault handlers (so nothing escalates oddly), keep clean
mww 0xE000ED24 0x00000000
# Mask all external interrupts
mww 0xE000E180 0xFFFFFFFF
mww 0xE000E184 0xFFFFFFFF
mww 0xE000E188 0xFFFFFFFF
mww 0xE000E18C 0xFFFFFFFF
mww 0xE000E280 0xFFFFFFFF
mww 0xE000E284 0xFFFFFFFF
mww 0xE000E288 0xFFFFFFFF
mww 0xE000E28C 0xFFFFFFFF
# Disable SysTick
mww 0xE000E010 0x00000000

echo "=== Set thread-mode context directly ==="
# privileged thread mode, use MSP, no FP context
reg control 0x00000000
# mask all interrupts/faults via PRIMASK and FAULTMASK
reg primask 0x00000001
reg faultmask 0x00000001
reg msp 0x20000380
reg sp  0x20000380
# xPSR: thread mode, Thumb bit set (T=1, bit24)
reg xPSR 0x01000000
reg pc [expr {$CODE_ADDR | 1}]

echo "=== Resume (300ms) ==="
resume
sleep 300
halt

echo "=== Debug ==="
echo "PC:    [capture { reg pc }]"
set cfsr [capture { mdw 0xE000ED28 1 }]
echo "CFSR: $cfsr"
set stat0 [capture { mdw 0x40005814 1 }]
echo "STAT0: $stat0"
set stat1 [capture { mdw 0x40005818 1 }]
echo "STAT1: $stat1"
set ctl0 [capture { mdw 0x40005800 1 }]
echo "CTL0: $ctl0"
set stub [capture { mdw 0x20001F00 1 }]
echo "STUB STATUS (0x600DDA7A=ok): $stub"
echo "PROGRESS (bytes done): [capture { mdw 0x20001F08 1 }]"
set buf [capture { mdw $BUF_ADDR 16 }]
echo "BUF: $buf"

echo "=== Read buffer ==="
dump_image /home/marek/tmp/kosiarka/eeprom/eeprom_dump.bin $BUF_ADDR 256
echo "Saved to eeprom_dump.bin"

echo "=== Restore + resume firmware ==="
mww 0xE000ED08 0x08000000
resume
shutdown
