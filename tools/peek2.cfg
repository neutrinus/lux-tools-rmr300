source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]
init
halt
echo "GPIOB CRL: [capture { mdw 0x40010C00 1 }]"
echo "GPIOB CRH: [capture { mdw 0x40010C04 1 }]"
echo "GPIOB IDR: [capture { mdw 0x40010C08 1 }]"
echo "RCC APB2EN: [capture { mdw 0x40021018 1 }]"
echo "RCC APB1EN: [capture { mdw 0x4002101C 1 }]"
echo "I2C CTL0: [capture { mdw 0x40005800 1 }]"
echo "I2C CTL1: [capture { mdw 0x40005804 1 }]"
echo "I2C STAT0: [capture { mdw 0x40005814 1 }]"
echo "I2C STAT1: [capture { mdw 0x40005818 1 }]"
echo "I2C CKCFG: [capture { mdw 0x4000581C 1 }]"
echo "I2C RT: [capture { mdw 0x40005820 1 }]"
shutdown
