source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

init
halt

# Save current I2C state
redirect /tmp/i2c_state.txt {
    echo "=== I2C1 init state ==="
    mdw 0x40005800 1
    mdw 0x40005804 1
    mdw 0x40005814 1
    mdw 0x40005818 1
    mdw 0x4000581C 1
    mdw 0x40005820 1
}

puts "I2C state saved to /tmp/i2c_state.txt"

# I2C read: write EEPROM address 0x00, then read 1 byte
# Reset I2C first
mww 0x40005800 0x0000
sleep 1
mww 0x40005800 0x0401
sleep 1

redirect /tmp/i2c_trace.txt {
    echo "=== Step 1: Generate START ==="
    mww 0x40005800 0x1501
    sleep 2
    
    echo "=== Step 2: Read SR1 (check SB) ==="
    mdw 0x40005814 1
    mdw 0x40005814 1  
    mdw 0x40005814 1
    
    echo "=== Step 3: Write 0xA0 to DATA ==="
    mww 0x40005810 0xA0
    sleep 2
    
    echo "=== Step 4: Read SR1 (check ADDR/AF) ==="
    mdw 0x40005814 1
    
    echo "=== Step 5: Read SR2 (clear ADDR) ==="
    mdw 0x40005818 1
    
    echo "=== Step 6: Read SR1 ==="
    mdw 0x40005814 1
    
    echo "=== Done ==="
}

puts "Trace saved to /tmp/i2c_trace.txt"

resume
shutdown
