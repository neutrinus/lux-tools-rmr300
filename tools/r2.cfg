source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

proc rd32 {a} {
    set r [capture { mdw $a 1 }]
    set idx [string last ": 0x" $r]
    if {$idx >= 0} {
        set h [string range $r [expr {$idx + 4}] end]
        return [expr "0x[string trim $h]"]
    }
    return -1
}

proc rd {n} { return [rd32 [expr {0x40005800 + $n}]] }
proc wr {n v} { mww [expr {0x40005800 + $n}] $v }

init

puts "=== I2C1 WITHOUT HALT ==="
puts "CR1=[format 0x%04x [rd 0x00]]"
puts "SR1=[format 0x%04x [rd 0x14]]"
puts "SR2=[format 0x%04x [rd 0x18]]"

# Check BUSY
set busy [expr {[rd 0x18] & 2}]
if {$busy} { puts "BUSY, abort"; resume; shutdown }

# Reset & re-enable I2C
wr 0x00 0
wr 0x00 0x401

# START + write mem addr 0
wr 0x00 0x1401
for {set i 0} {$i < 200} {incr i} {
    set s [rd 0x14]
    if {$s & 1} break
}
wr 0x10 0xA0
for {set i 0} {$i < 200} {incr i} {
    set s [rd 0x14]
    if {$s & 2} { set ack 1; break }
    if {$s & 0x100} { set ack 0; break }
}
if {!$ack} { puts "NACK on dev addr"; resume; shutdown }
rd 0x18  ;# clear ADDR
for {set i 0} {$i < 200} {incr i} {
    set s [rd 0x14]
    if {$s & 0x40} break
}
wr 0x10 0x00  ;# EEPROM mem addr 0
for {set i 0} {$i < 200} {incr i} {
    set s [rd 0x14]
    if {$s & 0x44} break
}

# Repeated START + read
wr 0x00 0x1401
for {set i 0} {$i < 200} {incr i} {
    set s [rd 0x14]
    if {$s & 1} break
}
wr 0x10 0xA1
for {set i 0} {$i < 200} {incr i} {
    set s [rd 0x14]
    if {$s & 2} { set ack2 1; break }
    if {$s & 0x100} { set ack2 0; break }
}
if {!$ack2} { puts "NACK on rd addr"; resume; shutdown }
rd 0x18  ;# clear ADDR

# Read 256 bytes
puts "Reading EEPROM..."
set data {}
for {set b 0} {$b < 256} {incr b} {
    for {set i 0} {$i < 2000} {incr i} {
        if {[rd 0x14] & 0x20} break
    }
    if {$b == 255} { wr 0x00 0x0901 }  ;# NAK+STOP
    set v [rd 0x10]
    lappend data [format %02x [expr {$v & 0xFF}]]
}
puts "=== EEPROM DUMP ==="
puts [join $data]
puts "=== ASCII (first 32) ==="
for {set i 0} {$i < 32} {incr i} {
    set val [lindex $data $i]
    scan $val %2x c
    if {$c >= 32 && $c < 127} {
        puts -nonewline [format %c $c]
    } else { puts -nonewline . }
}
puts ""

# Save to file
set fd [open /home/marek/tmp/kosiarka/eeprom/eeprom_dump.txt w]
puts $fd [join $data]
close $fd
puts "Saved to eeprom_dump.txt"

resume
shutdown
