source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]
init
halt
echo "Dumping 1MB flash..."
dump_image /home/marek/tmp/kosiarka/firmware/u13_flash_1mb.bin 0x08000000 0x100000
echo "Done"
resume
shutdown
