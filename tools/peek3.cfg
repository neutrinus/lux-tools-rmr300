source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]
init
halt
echo "I2C@0x40005400 CTL0: [capture { mdw 0x40005400 1 }]"
echo "I2C@0x40005400 CTL1: [capture { mdw 0x40005404 1 }]"
echo "I2C@0x40005400 STAT0: [capture { mdw 0x40005414 1 }]"
echo "I2C@0x40005400 STAT1: [capture { mdw 0x40005418 1 }]"
echo "I2C@0x40005400 CKCFG: [capture { mdw 0x4000541C 1 }]"
echo "PB10/PB11 IDR (bit10/11): [capture { mdw 0x40010C08 1 }]"
echo "AFIO MAPR: [capture { mdw 0x40010004 1 }]"
shutdown
