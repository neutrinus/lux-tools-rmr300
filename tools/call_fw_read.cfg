source [find interface/cmsis-dap.cfg]
adapter driver cmsis-dap
cmsis_dap_vid_pid 0x2e8a 0x000c
transport select swd
adapter speed 1000
source [find target/stm32f3x.cfg]

# firmware I2C EEPROM read function (FUN_0x08053930):
#   r0 = device address byte (0xD0)
#   r1 = EEPROM word address
#   r2 = destination buffer
#   r3 = byte count
#   [sp+0] = timeout (0x2000)
set READ_FN  0x08053931
set BUF_ADDR 0x20001000
# a known idle/return point in flash to trap on (any bkpt addr); we use a
# scratch in SRAM with an infinite loop we install ourselves.
set RET_TRAP 0x20002000

init
halt

echo "=== Prepare buffer ==="
for {set i 0} {$i < 256} {incr i 4} { mww [expr {$BUF_ADDR + $i}] 0 }

# Install an infinite-loop trap at RET_TRAP:  0xE7FE = b .
mwh $RET_TRAP 0xE7FE

# Disable FPU lazy stacking + MPU so no fault during the call
mww 0xE000ED88 0x00000000
mww 0xE000EDF0 0x00000000
mww 0xE000ED94 0x00000000

echo "=== Set up call to firmware read fn ==="
reg r0 0xD0
reg r1 0x00
reg r2 $BUF_ADDR
reg r3 256
# set a fresh stack well away from firmware's, push timeout arg at [sp+0]
reg sp 0x20002800
mww 0x20002800 0x00002000
reg msp 0x20002800
# return address -> our trap (thumb)
reg lr [expr {$RET_TRAP | 1}]
reg pc $READ_FN
reg xPSR 0x01000000

echo "=== Resume and wait for return ==="
resume
sleep 100
halt

echo "PC: [capture { reg pc }]"
echo "r0(ret): [capture { reg r0 }]"
echo "STAT0: [capture { mdw 0x40005814 1 }]"
echo "STAT1: [capture { mdw 0x40005818 1 }]"
echo "CTL0:  [capture { mdw 0x40005800 1 }]"
echo "BUF:   [capture { mdw $BUF_ADDR 16 }]"

echo "=== Save dump ==="
dump_image /home/marek/tmp/kosiarka/eeprom_dump.bin $BUF_ADDR 256
echo "Saved"

resume
shutdown
