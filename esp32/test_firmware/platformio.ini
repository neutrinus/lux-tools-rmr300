[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
build_type = debug

board_build.flash_mode = dout
board_build.f_cpu = 240000000L
board_build.flash_size = 2MB

; Set A: {33, 18, 32} — only triple that ever produced display response
; Set B: {25, 32, 33} — from 1610-report cross-reference analysis
build_flags =
    -D PIN_SET_A

monitor_speed = 115200
