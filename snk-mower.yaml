substitutions:
  name: kosiarka
  friendly_name: Kosiarka

external_components:
  - source: github://neutrinus/lux-tools-rmr300@main:components
    components: [snk_mower]

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:
  baud_rate: 0
  level: VERBOSE
  task_log_buffer_size: 8192

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback Hotspot
    password: "Hxye5fmx2yDo"

captive_portal:

api:
  encryption:
    key: "NDgm+gGpAoan2fh1f71mGv9lMga8nOynabbt8gF3JRM="

ota:
  - platform: esphome

uart:
  id: mower_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 230400
  rx_buffer_size: 512

snk_mower:
  id: my_mower
  uart_id: mower_uart
  pin: "9633"
  display_clk: 18
  display_mosi: 23
  display_cs: 5
  buzzer_pin: 27
  rain_pin: 36
  display_off_timeout: 5
  boot_delay: 10
  pin_diag: false
  lcd_find: true

  battery_level:
    name: "${friendly_name} Battery Level"
  battery_voltage:
    name: "${friendly_name} Battery Voltage"
  error_code:
    name: "${friendly_name} Error Code"
  light_level:
    name: "${friendly_name} Light Level"
  signal_level:
    name: "${friendly_name} Signal Level"
  work_area:
    name: "${friendly_name} Work Area"
  cut_area:
    name: "${friendly_name} Cut Area"
  total_minutes:
    name: "${friendly_name} Total Minutes"
  on_minutes:
    name: "${friendly_name} On Minutes"
  bat_health:
    name: "${friendly_name} Battery Health"
  bat_level_bars:
    name: "${friendly_name} Battery Bars"
  rain_delay:
    name: "${friendly_name} Rain Delay"

  is_mowing:
    name: "${friendly_name} Mowing"
  is_charging:
    name: "${friendly_name} Charging"
  is_docked:
    name: "${friendly_name} Docked"
  has_error:
    name: "${friendly_name} Has Error"
  is_locked:
    name: "${friendly_name} Locked"
  is_returning:
    name: "${friendly_name} Returning"

  device_name:
    name: "${friendly_name} Device Name"
  model:
    name: "${friendly_name} Model"
  serial:
    name: "${friendly_name} Serial"
  firmware_version:
    name: "${friendly_name} Firmware Version"
  battery_name:
    name: "${friendly_name} Battery Type"
  mower_state:
    name: "${friendly_name} State"

# ── Physical buttons ────────────────────────────────────────
binary_sensor:
  - platform: gpio
    name: "${friendly_name} Start Button"
    pin:
      number: GPIO26
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - lambda: 'id(my_mower)->start_mowing();'

  - platform: gpio
    name: "${friendly_name} Home Button"
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - lambda: 'id(my_mower)->return_to_dock();'

  - platform: gpio
    name: "${friendly_name} Rain Detected"
    pin:
      number: GPIO36
      mode: INPUT
    device_class: moisture
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms

# ── HA buttons (virtual) ────────────────────────────────────
button:
  - platform: template
    name: "${friendly_name} Start Mowing"
    icon: mdi:play
    on_press:
      - lambda: 'id(my_mower)->start_mowing();'

  - platform: template
    name: "${friendly_name} Return to Dock"
    icon: mdi:home-import-outline
    on_press:
      - lambda: 'id(my_mower)->return_to_dock();'

# ── Sensors ─────────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    name: "${friendly_name} Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 5min

# ── Bluetooth proxy (optional) ──────────────────────────────
bluetooth_proxy:
  active: true
