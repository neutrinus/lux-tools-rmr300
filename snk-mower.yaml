substitutions:
  name: kosiarka
  friendly_name: Kosiarka

external_components:
  - source: github://neutrinus/lux-tools-rmr300@main:components
    components: [snk_mower]
    refresh: 10s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:
  baud_rate: 0
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback Hotspot
    password: "Hxye5fmx2yDo"

captive_portal:

time:
  - platform: sntp
    id: mower_time

api:
  encryption:
    key: "NDgm+gGpAoan2fh1f71mGv9lMga8nOynabbt8gF3JRM="

ota:
  - platform: esphome

uart:
  id: mower_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 230400
  rx_buffer_size: 512

snk_mower:
  id: my_mower
  uart_id: mower_uart
  pin: "9633"
  display_clk: 33
  display_mosi: 25
  display_cs: 32
  buzzer_pin: 27
  rain_pin: 36
  boot_delay: 30

  battery_level:
    name: "${friendly_name} Battery Level"
  battery_voltage:
    name: "${friendly_name} Battery Voltage"
  error_code:
    name: "${friendly_name} Error Code"
  light_level:
    name: "${friendly_name} Light Level"
  signal_level:
    name: "${friendly_name} Signal Level"
  work_area:
    name: "${friendly_name} Work Area"
  cut_area:
    name: "${friendly_name} Cut Area"
  total_minutes:
    name: "${friendly_name} Total Minutes"
  on_minutes:
    name: "${friendly_name} On Minutes"
  bat_health:
    name: "${friendly_name} Battery Health"
  bat_level_bars:
    name: "${friendly_name} Battery Bars"
  rain_delay:
    name: "${friendly_name} Rain Delay"

  is_mowing:
    name: "${friendly_name} Is Mowing"
  is_charging:
    name: "${friendly_name} Is Charging"
  is_docked:
    name: "${friendly_name} Is Docked"
  has_error:
    name: "${friendly_name} Has Error"
  is_locked:
    name: "${friendly_name} Is Locked"
  is_returning:
    name: "${friendly_name} Is Returning"

  device_name:
    name: "${friendly_name} Device Name"
  model:
    name: "${friendly_name} Model"
  serial:
    name: "${friendly_name} Serial"
  firmware_version:
    name: "${friendly_name} Firmware Version"
  battery_name:
    name: "${friendly_name} Battery Name"
  mower_state:
    name: "${friendly_name} Mower State"

binary_sensor:
  - platform: gpio
    pin: GPIO19
    name: "${friendly_name} OK Button"
    device_class: "connectivity"
    filters:
      - invert:
      - delayed_on_off: 10ms

button:
  - platform: template
    name: "${friendly_name} Start Mowing"
    icon: "mdi:play"
    on_press:
      - lambda: 'id(my_mower).start_mowing();'
  - platform: template
    name: "${friendly_name} Return to Dock"
    icon: "mdi:home-import-outline"
    on_press:
      - lambda: 'id(my_mower).return_to_dock();'

  # Action commands discovered in ESP32 decompilation (FUN_400e277c)
  # Original firmware sent: {"app_main":24.125,"chedule":<value>}
  # Action values (mapped from "robot status : XXX" log strings in ESP32):
  #   0=idle/stop, 1=work/mow, 2=edge, 3=pause, 4=dock/return,
  #   5=charging, 6=poweroff, 7=rain dock, 8=rain wait, 9=rain delay
  - platform: template
    name: "${friendly_name} Action: Mow (1)"
    icon: "mdi:grass"
    on_press:
      - lambda: 'id(my_mower).send_action(1);'
  - platform: template
    name: "${friendly_name} Action: Dock (4)"
    icon: "mdi:home-import-outline"
    on_press:
      - lambda: 'id(my_mower).send_action(4);'
  - platform: template
    name: "${friendly_name} Action: Stop (0)"
    icon: "mdi:stop"
    on_press:
      - lambda: 'id(my_mower).send_action(0);'
  - platform: template
    name: "${friendly_name} Action: Edge (2)"
    icon: "mdi:border-all-variant"
    on_press:
      - lambda: 'id(my_mower).send_action(2);'
  - platform: template
    name: "${friendly_name} Action: Pause (3)"
    icon: "mdi:pause"
    on_press:
      - lambda: 'id(my_mower).send_action(3);'

text:
  - platform: template
    name: "${friendly_name} Action Value"
    icon: "mdi:send"
    mode: text
    optimistic: true
    initial_value: "1"
    on_value:
      - lambda: |
          int v = atoi(x.c_str());
          ESP_LOGI("ha", "Sending action value: %d", v);
          id(my_mower).send_action(v);
  - platform: template
    name: "${friendly_name} Raw JSON"
    icon: "mdi:code-json"
    mode: text
    optimistic: true
    initial_value: '{"app_main":24.125,"chedule":1}'
    on_value:
      - lambda: |
          id(my_mower).send_raw_json(x);
