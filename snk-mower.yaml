substitutions:
  name: kosiarka
  friendly_name: Kosiarka

external_components:
  - source: github://neutrinus/lux-tools-rmr300@main:components
    components: [snk_mower]
    refresh: 10s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:
  baud_rate: 0
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback Hotspot
    password: "Hxye5fmx2yDo"

captive_portal:

time:
  - platform: sntp
    id: mower_time

api:
  encryption:
    key: "NDgm+gGpAoan2fh1f71mGv9lMga8nOynabbt8gF3JRM="

ota:
  - platform: esphome

uart:
  id: mower_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 230400
  rx_buffer_size: 512

snk_mower:
  id: my_mower
  uart_id: mower_uart
  pin: "9633"
  display_clk: 33
  display_mosi: 25
  display_cs: 32
  buzzer_pin: 27
  rain_pin: 36
  boot_delay: 30
  compat_mode: true

  battery_level:
    name: "${friendly_name} Battery Level"
  battery_voltage:
    name: "${friendly_name} Battery Voltage"
  error_code:
    name: "${friendly_name} Error Code"
  light_level:
    name: "${friendly_name} Light Level"
  signal_level:
    name: "${friendly_name} Signal Level"
  work_area:
    name: "${friendly_name} Work Area"
  cut_area:
    name: "${friendly_name} Cut Area"
  total_minutes:
    name: "${friendly_name} Total Minutes"
  on_minutes:
    name: "${friendly_name} On Minutes"
  bat_health:
    name: "${friendly_name} Battery Health"
  bat_level_bars:
    name: "${friendly_name} Battery Bars"
  rain_delay:
    name: "${friendly_name} Rain Delay"

  is_mowing:
    name: "${friendly_name} Is Mowing"
  is_charging:
    name: "${friendly_name} Is Charging"
  is_docked:
    name: "${friendly_name} Is Docked"
  has_error:
    name: "${friendly_name} Has Error"
  is_locked:
    name: "${friendly_name} Is Locked"
  is_returning:
    name: "${friendly_name} Is Returning"

  device_name:
    name: "${friendly_name} Device Name"
  model:
    name: "${friendly_name} Model"
  serial:
    name: "${friendly_name} Serial"
  firmware_version:
    name: "${friendly_name} Firmware Version"
  battery_name:
    name: "${friendly_name} Battery Name"
  mower_state:
    name: "${friendly_name} Mower State"

binary_sensor:
  - platform: gpio
    pin: GPIO19
    name: "${friendly_name} OK Button"
    device_class: "connectivity"
    filters:
      - invert:
      - delayed_on_off: 10ms

  # Testowane piny z analiz firmware'u:
  - platform: gpio
    pin: GPIO13
    name: "${friendly_name} GPIO13"
    device_class: "connectivity"
    filters:
      - invert:
      - delayed_on_off: 10ms

  - platform: gpio
    pin: GPIO15
    name: "${friendly_name} GPIO15"
    device_class: "connectivity"
    filters:
      - invert:
      - delayed_on_off: 10ms

  - platform: gpio
    pin: GPIO20
    name: "${friendly_name} GPIO20"
    device_class: "connectivity"
    filters:
      - invert:
      - delayed_on_off: 10ms

  - platform: gpio
    pin: GPIO22
    name: "${friendly_name} GPIO22"
    device_class: "connectivity"
    filters:
      - invert:
      - delayed_on_off: 10ms

button:
  - platform: template
    name: "${friendly_name} Start Mowing"
    icon: "mdi:play"
    on_press:
      - lambda: 'id(my_mower).start_mowing();'
  - platform: template
    name: "${friendly_name} Return to Dock"
    icon: "mdi:home-import-outline"
    on_press:
      - lambda: 'id(my_mower).return_to_dock();'

  # === Test commands (no cmd field — likely ignored by MB) ===
  - platform: template
    name: "${friendly_name} Action: Mow (1)"
    icon: "mdi:grass"
    on_press:
      - lambda: 'id(my_mower).send_action(1);'
  - platform: template
    name: "${friendly_name} Action: Dock (4)"
    icon: "mdi:home-import-outline"
    on_press:
      - lambda: 'id(my_mower).send_action(4);'

  # === Test commands with cmd field ===
  # START_ACK (0x41000020) — normally MB→ESP after START button
  - platform: template
    name: "${friendly_name} Test: START_ACK"
    icon: "mdi:debug-step-over"
    on_press:
      - lambda: 'id(my_mower).send_raw_json("{\"cmd\":1090519072}");'
  # EXEC_ACTION (0x41000003) — normally MB→ESP after action executed
  - platform: template
    name: "${friendly_name} Test: EXEC_ACTION"
    icon: "mdi:debug-step-over"
    on_press:
      - lambda: 'id(my_mower).send_raw_json("{\"cmd\":1090519043}");'
  # CMD 0x4100000A ("action" in dispatch table) with action field
  - platform: template
    name: "${friendly_name} Test: CMD action=1"
    icon: "mdi:debug-step-over"
    on_press:
      - lambda: 'id(my_mower).send_raw_json("{\"cmd\":1090519050,\"action\":1}");'
  - platform: template
    name: "${friendly_name} Test: CMD action=4"
    icon: "mdi:debug-step-over"
    on_press:
      - lambda: 'id(my_mower).send_raw_json("{\"cmd\":1090519050,\"action\":4}");'
  # ESP_TRIM with auto=1 and schedule for current time
  - platform: template
    name: "${friendly_name} Test: ESP_TRIM auto=1"
    icon: "mdi:calendar-clock"
    on_press:
      - lambda: |
          char buf[256];
          time_t now = ::time(nullptr);
          struct tm *t = localtime(&now);
          int st = t->tm_hour * 60 + t->tm_min;
          snprintf(buf, sizeof(buf),
            "{\"cmd\":805306534,\"auto\":1,\"trim\":120,\"sun_st\":%d,\"sun_len\":120,\"mon_st\":%d,\"mon_len\":120,\"tue_st\":%d,\"tue_len\":120,\"wed_st\":%d,\"wed_len\":120,\"thu_st\":%d,\"thu_len\":120,\"fri_st\":%d,\"fri_len\":120,\"sat_st\":%d,\"sat_len\":120}",
            st, st, st, st, st, st, st);
          id(my_mower).send_raw_json(buf);

  # === Send Raw JSON button (reads from text field below) ===
  - platform: template
    name: "${friendly_name} Send Raw JSON"
    icon: "mdi:send"
    on_press:
      - lambda: 'id(my_mower).send_raw_json(id(raw_json_buf));'

globals:
  - id: raw_json_buf
    type: std::string
    restore_value: no
    initial_value: ''

text:
  - platform: template
    name: "${friendly_name} Raw JSON"
    icon: "mdi:code-json"
    mode: text
    optimistic: true
    initial_value: '{"cmd":1090519050,"action":1}'
    on_value:
      - lambda: |
          id(raw_json_buf) = x;
          ESP_LOGI("ha", "Raw JSON buffer updated: %s", x.c_str());
