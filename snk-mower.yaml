# ESPHome configuration — SNK Mower (Lux Tools A-RMR-300-24 / Adano RM5)
#
# Hardware: Display board SNK_DISPLAY_CP_V11 with ESP32-WROOM-32UE
#
# Custom component: components/snk_mower/
#
# Wiring:
#   UART TX → GPIO15 (to mainboard)
#   UART RX ← GPIO13 (from mainboard)
#   Display CLK → GPIO18 (SPI SCLK)
#   Display MOSI → GPIO23 (SPI MOSI)
#   Display CS → GPIO5  (SPI CS / 74HC595 latch)
#   Button START → GPIO26
#   Button HOME  → GPIO25
#   Button OK    → GPIO33 (unused, still forked to mainboard)
#   Button ON    → GPIO27 (unused, still forked to mainboard)
#   Rain sensor → GPIO36 (ADC)
#   Buzzer      → GPIO12 (PWM, optional)

substitutions:
  name: snk-mower
  friendly_name: SNK Mower
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  api_key: !secret api_key
  ota_password: !secret ota_password

external_components:
  - source: github://neutrinus/lux-tools-rmr300@main:components
    components: [snk_mower]

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

logger:
  baud_rate: 0  # disable UART0 logger (conflicts with J1 programming port)
  level: INFO

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: ${api_key}

ota:
  password: ${ota_password}

# ── UART to mainboard (GPIO13 RX, GPIO15 TX, 115200 8N1) ───
uart:
  id: mower_uart
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 115200

# ── SNK Mower custom component ─────────────────────────────
snk_mower:
  uart_id: mower_uart
  pin: "9633"                       # ← change to your PIN
  display_clk: 18                   # SCLK → 74HC595 SH_CP
  display_mosi: 23                  # MOSI → 74HC595 DS
  display_cs: 5                     # CS/latch → 74HC595 ST_CP
  buzzer_pin: 12                    # optional, 0-39, omit to disable
  display_off_timeout: 5            # minutes of idle before display off (0=never)

  battery_level:
    name: "${friendly_name} Battery Level"
  battery_voltage:
    name: "${friendly_name} Battery Voltage"
  error_code:
    name: "${friendly_name} Error Code"
  is_mowing:
    name: "${friendly_name} Mowing"
  is_charging:
    name: "${friendly_name} Charging"
  is_docked:
    name: "${friendly_name} Docked"
  has_error:
    name: "${friendly_name} Has Error"

# ── Physical buttons ────────────────────────────────────────
binary_sensor:
  - platform: gpio
    name: "${friendly_name} Start Button"
    pin:
      number: GPIO26
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - debounce: 50ms
    on_press:
      then:
        - lambda: 'id(snk_mower)->start_mowing();'

  - platform: gpio
    name: "${friendly_name} Home Button"
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - debounce: 50ms
    on_press:
      then:
        - lambda: 'id(snk_mower)->return_to_dock();'

  - platform: gpio
    name: "${friendly_name} Rain Detected"
    pin:
      number: GPIO36
      mode: INPUT
    device_class: moisture
    filters:
      - debounce: 200ms

# ── HA buttons (virtual) ────────────────────────────────────
button:
  - platform: template
    name: "${friendly_name} Start Mowing"
    icon: mdi:play
    on_press:
      - lambda: 'id(snk_mower)->start_mowing();'

  - platform: template
    name: "${friendly_name} Return to Dock"
    icon: mdi:home-import-outline
    on_press:
      - lambda: 'id(snk_mower)->return_to_dock();'

# ── Sensors ─────────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    name: "${friendly_name} Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 5min

# ── Bluetooth proxy (optional) ──────────────────────────────
bluetooth_proxy:
  active: true
