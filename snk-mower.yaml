substitutions:
  name: kosiarka
  friendly_name: Kosiarka

external_components:
  - source: github://neutrinus/lux-tools-rmr300@main:components
    components: [snk_mower]
    refresh: 10s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:
  baud_rate: 0
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback Hotspot
    password: "Hxye5fmx2yDo"

captive_portal:

api:
  encryption:
    key: "NDgm+gGpAoan2fh1f71mGv9lMga8nOynabbt8gF3JRM="

ota:
  - platform: esphome

uart:
  id: mower_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 230400
  rx_buffer_size: 512

snk_mower:
  id: my_mower
  uart_id: mower_uart
  pin: "9633"
  display_clk: 33
  display_mosi: 25
  display_cs: 32
  buzzer_pin: 27
  rain_pin: 36
  boot_delay: 30
