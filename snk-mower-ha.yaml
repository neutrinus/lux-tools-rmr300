substitutions:
  name: kosiarka
  friendly_name: Kosiarka

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

logger:
  baud_rate: 0
  level: VERY_VERBOSE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback Hotspot
    password: "Hxye5fmx2yDo"

captive_portal:

api:
  encryption:
    key: "NDgm+gGpAoan2fh1f71mGv9lMga8nOynabbt8gF3JRM="

ota:

uart:
  id: mower_uart
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 230400


sensor:
  - platform: wifi_signal
    name: "${friendly_name} Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 5min
